<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Deezer Embed 2</title>
<style>
  body { background: #070E2B; color: #F0F4FF; font-family: sans-serif; padding: 2rem; }
  h2 { color: #F5C800; margin-bottom: 0.5rem; }
  p { color: #A0AACC; font-size: 0.85rem; margin-bottom: 1rem; }
  .test { margin-bottom: 2.5rem; }
  iframe { display: block; border-radius: 8px; }
</style>
</head>
<body>

<h1 style="color:#F5C800; margin-bottom:2rem;">Test widget Deezer — con app_id</h1>

<!-- TEST 1: Con app_id, sin timestamp -->
<div class="test">
  <h2>Test 1 — Con app_id, sin timestamp</h2>
  <p>Track 7: "50 Años, Retorno, Hombre Solitario"</p>
  <iframe
    src="https://widget.deezer.com/widget/dark/track/2362277115?app_id=457142"
    width="100%" height="90"
    frameborder="0"
    allowtransparency="true"
    allow="encrypted-media; clipboard-write">
  </iframe>
</div>

<!-- TEST 2: Con app_id y timestamp El Retorno -->
<div class="test">
  <h2>Test 2 — Con app_id + start=100 (El Retorno)</h2>
  <p>Mismo track, segundo 100</p>
  <iframe
    src="https://widget.deezer.com/widget/dark/track/2362277115?app_id=457142&start=100"
    width="100%" height="90"
    frameborder="0"
    allowtransparency="true"
    allow="encrypted-media; clipboard-write">
  </iframe>
</div>

<!-- TEST 3: Formato alternativo autoplay -->
<div class="test">
  <h2>Test 3 — Con autoplay=false</h2>
  <p>Por si el autoplay bloquea la carga</p>
  <iframe
    src="https://widget.deezer.com/widget/dark/track/2362277115?app_id=457142&autoplay=false"
    width="100%" height="90"
    frameborder="0"
    allowtransparency="true"
    allow="encrypted-media; clipboard-write">
  </iframe>
</div>

</body>
</html>
